<!DOCTYPE html>
<html lang="en-IN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoScore | AI Citation Authority for Indian Enterprises</title>
    <meta name="description" content="Boost your brand's visibility in AI-generated searches. DPDP-compliant citation matching and SEO for the AI era.">
    <link rel="canonical" href="https://geo-score.in">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "GeoScore",
      "operatingSystem": "All",
      "applicationCategory": "BusinessApplication",
      "offers": {
        "@type": "Offer",
        "price": "8499",
        "priceCurrency": "INR"
      }
    }
    </script>

    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
</head>
<body>
    <header role="banner">
        <nav aria-label="Main Navigation">
            <div class="logo">GEOSCORE</div>
            <button class="lang-toggle" aria-label="Switch to Hindi">हिंदी</button>
        </nav>
    </header>

    <main>
        <section class="hero" aria-labelledby="hero-heading">
            <h1 id="hero-heading">Master the <span id="typewriter">AI Citation</span></h1>
            <p class="status-badge" aria-live="polite">
                April 2026 Update: DPDP Compliant Infrastructure
            </p>
        </section>

        <section class="pricing" id="pricing" data-base-price="8499">
            <h2>Professional Plan</h2>
            <div class="price-container">
                <span class="currency">₹</span>
                <span id="display-price">8,499</span>
                <span class="tax-suffix">/month + GST</span>
            </div>
            <p class="payment-methods">Includes UPI, Cards, and Netbanking</p>
            
            <button id="checkout-button" class="btn-primary" aria-label="Initiate Subscription for 8499 Rupees">
                INITIATE SUBSCRIPTION
            </button>
        </section>
    </main>

    <footer>
        <div class="footer-links">
            <a href="https://wa.me/yournumber" class="whatsapp-link" target="_blank" rel="noopener">
                Chat with Sales on WhatsApp
            </a>
        </div>
        <p>MADE IN BHARAT 🇮🇳</p>
    </footer>

    <script src="script.js" defer></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
</body>
</html>
