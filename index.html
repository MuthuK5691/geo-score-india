<!DOCTYPE html>
<html lang="en-IN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoScore | AI Citation Authority for Indian Enterprises</title>
    
    <meta name="description" content="GeoScore helps Indian brands get cited by ChatGPT, Gemini, and Perplexity. DPDP-compliant AI citation infrastructure and SEO.">
    <link rel="canonical" href="https://geo-score.in">
    <meta name="geo.region" content="IN">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "GeoScore India",
      "url": "https://geo-score.in",
      "address": { "@type": "PostalAddress", "addressCountry": "IN" },
      "offers": {
        "@type": "Offer",
        "price": "8499",
        "priceCurrency": "INR"
      }
    }
    </script>

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header role="banner">
        <nav aria-label="Main Navigation">
            <div class="logo">GEOSCORE</div>
            <div class="nav-right">
                <button class="lang-btn" aria-label="Switch to Hindi">हिंदी</button>
                <a href="https://wa.me/YOUR_NUMBER" class="whatsapp-cta" aria-label="Contact on WhatsApp">WhatsApp Support</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero" aria-labelledby="hero-title">
            <h1 id="hero-title">Get Cited by ChatGPT & Gemini</h1>
            <p class="trust-badge">
                <span class="icon">🛡️</span> DPDP-Compliant Infrastructure — <a href="/audit">View Q1 2026 Audit</a>
            </p>
        </section>

        <section class="pricing" id="billing" data-base-price="8499">
            <h2>Professional Plan</h2>
            <div class="price-box">
                <span class="amt">₹8,499</span>
                <span class="suffix">/month + GST</span>
            </div>
            <p class="payment-note">Secure payment via UPI, Card, or Netbanking</p>
            <button id="rzp-button" class="btn-primary">INITIATE SUBSCRIPTION</button>
        </section>
    </main>

    <footer role="contentinfo">
        <p>MADE IN BHARAT 🇮🇳</p>
        <p class="legal">GSTIN: [Your-GST-Number] | PAN Verified</p>
    </footer>

    <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
    <script src="script.js" defer></script>
</body>
</html>
