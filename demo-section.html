<section class="demo-request" id="request-demo" aria-labelledby="demo-heading">
    <div class="container">
        <h2 id="demo-heading">Request a Strategy Consultation</h2>
        <p class="section-subtitle">See how GeoScore secures your brand's authority in AI search results.</p>

        <form id="demo-form" class="modern-form" novalidate>
            <div class="form-grid">
                <div class="input-group">
                    <label for="full-name">Full Name *</label>
                    <input type="text" id="full-name" name="name" placeholder="Arjun Sharma" required>
                </div>
                <div class="input-group">
                    <label for="work-email">Work Email *</label>
                    <input type="email" id="work-email" name="email" placeholder="arjun@enterprise.in" required>
                </div>
                <div class="input-group">
                    <label for="company-url">Company Website *</label>
                    <input type="url" id="company-url" name="website" placeholder="https://company.in" required>
                </div>
                <div class="input-group">
                    <label for="phone">Phone (WhatsApp preferred)</label>
                    <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210">
                </div>
            </div>

            <div class="consent-block">
                <input type="checkbox" id="dpdp-consent" name="consent" required>
                <label for="dpdp-consent">
                    I consent to GeoScore India processing my personal data to contact me regarding AI citation services. I have read the <a href="/privacy-policy" target="_blank">Privacy Notice</a> and understand my rights as a Data Principal.
                </label>
            </div>

            <div id="form-status" aria-live="polite"></div>

            <button type="submit" class="btn-submit">
                <span class="btn-text">REQUEST ACCESS</span>
                <div class="loader" hidden></div>
            </button>
        </form>
    </div>
</section>
